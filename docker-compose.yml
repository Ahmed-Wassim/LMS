services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teacher-saas-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: teacher-saas-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:17
    container_name: teacher-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teacher_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: teacher-saas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teacher-saas-queue
    restart: unless-stopped
    command: php artisan queue:work
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teacher-saas-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor

volumes:
  postgres_data:
  vendor_data:
